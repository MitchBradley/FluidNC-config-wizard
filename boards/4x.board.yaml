board:
  id: 4x
  name: "4x CNC Controller (Integrated ESP32 and TMC2209)"
  manufacturer: "Dring Engineering Services"
  mcu_chip: esp32
  status: unverified
stepping:
  engines: [i2s]
fixed_peripherals:
  spi: { miso_pin: gpio.19, mosi_pin: gpio.23, sck_pin: gpio.18 }
  sdcard: { cs_pin: gpio.5 }
  i2so: { bck_pin: gpio.22, data_pin: gpio.21, ws_pin: gpio.17, pin_count: 16 }
  dedicated_uarts:
    - { label: "TMC2209 UART", txd_pin: gpio.26, rxd_pin: gpio.2, baud: 115200, mode: "8N1" }
motor_sockets:
  sockets:
    - label: "Motor1"
      generic_name: Motor1
      driver_class: onboard_fixed
      fixed_motor_type: tmc_2209
      pins: { step_pin: i2so.2, direction_pin: i2so.1, disable_pin: i2so.0 }
      extra: { bus: uart1, addr: 0 }
    - label: "Motor2"
      generic_name: Motor2
      driver_class: onboard_fixed
      fixed_motor_type: tmc_2209
      pins: { step_pin: i2so.5, direction_pin: i2so.4, disable_pin: i2so.7 }
      extra: { bus: uart1, addr: 1 }
    - label: "Motor3"
      generic_name: Motor3
      driver_class: onboard_fixed
      fixed_motor_type: tmc_2209
      pins: { step_pin: i2so.10, direction_pin: i2so.9, disable_pin: i2so.8 }
      extra: { bus: uart1, addr: 2 }
    - label: "Motor4"
      generic_name: Motor4
      driver_class: onboard_fixed
      fixed_motor_type: tmc_2209
      pins: { step_pin: i2so.13, direction_pin: i2so.12, disable_pin: i2so.15 }
      extra: { bus: uart1, addr: 3 }
generic_pins:
  - { label: "IO32", generic_name: "In32", mcu_pin: gpio.32, direction: input, input_profile: { conditioning: opto_isolated } }
  - { label: "IO33", generic_name: "In33", mcu_pin: gpio.33, direction: input, input_profile: { conditioning: opto_isolated } }
  - { label: "IO34", generic_name: "In34", mcu_pin: gpio.34, direction: input, input_profile: { conditioning: opto_isolated } }
  - { label: "IO35", generic_name: "In35", mcu_pin: gpio.35, direction: input, input_profile: { conditioning: opto_isolated } }
  - { label: "IO36", generic_name: "In36", mcu_pin: gpio.36, direction: input, input_profile: { conditioning: opto_isolated } }
  - { label: "IO39", generic_name: "In39", mcu_pin: gpio.39, direction: input, input_profile: { conditioning: opto_isolated } }
  - { label: "5V Out (shared w/ MOSFET1)", generic_name: "5V Out4", mcu_pin: gpio.4, direction: output, output_profile: { drive_type: totem_pole } }
  - { label: "MOSFET1", generic_name: "FET4", mcu_pin: gpio.4, direction: output, output_profile: { drive_type: mosfet_low_side } }
  - { label: "5V Out (shared w/ MOSFET2)", generic_name: "5V Out12", mcu_pin: gpio.12, direction: output, output_profile: { drive_type: totem_pole } }
  - { label: "MOSFET2", generic_name: "FET12", mcu_pin: gpio.12, direction: output, output_profile: { drive_type: mosfet_low_side } }
  - { label: "5V Out 3", generic_name: "5V Out13", mcu_pin: gpio.13, direction: output, output_profile: { drive_type: totem_pole } }
  - { label: "5V Out 4", generic_name: "5V Out14", mcu_pin: gpio.14, direction: output, output_profile: { drive_type: totem_pole } }
  - { label: "Out1", generic_name: "Out1", mcu_pin: gpio.15, direction: output, output_profile: { drive_type: open_collector } }
  - { label: "Out2", generic_name: "Out2", mcu_pin: gpio.14, direction: output, output_profile: { drive_type: open_collector } }
rs485_channels:
  - { label: "RS485", tx_pin: gpio.15, rx_pin: gpio.16, rts_pin: gpio.14, pins_reusable_as_generic_io: true }
expansion_sockets:
  - label: "Expansion Module Socket"
    pins:
      - { module_pin: "1", mcu_pin: gpio.25, direction: bidirectional }
      - { module_pin: "2", mcu_pin: gpio.27, direction: bidirectional }
