<style>
  :root {
    --bg: #0f1417; --panel: #171e23; --border: #2a343b; --text: #dbe4e8;
    --muted: #7d8f98; --accent: #4fb5c9; --tbd: #d9a441; --fixed: #5c7d63;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); font-size: 14px;
  }
  header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 17px; margin: 0; font-weight: 600; }
  header p { margin: 0; color: var(--muted); font-size: 12.5px; }
  select, button {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 5px; padding: 6px 10px; font-size: 13px; font-family: inherit;
  }
  button { cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #06181c; font-weight: 600; border-color: var(--accent); }
  main { display: grid; grid-template-columns: 1fr 1fr; gap: 0; height: calc(100vh - 61px); }
  .col { overflow-y: auto; padding: 18px 24px; }
  .col.left { border-right: 1px solid var(--border); }
  section { margin-bottom: 22px; }
  section h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--muted); margin: 0 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .row {
    display: grid; grid-template-columns: 1fr 200px; gap: 10px; align-items: center;
    padding: 6px 0;
  }
  .row .lbl { display: flex; flex-direction: column; }
  .row .lbl .name { font-weight: 600; }
  .row .lbl .sub { color: var(--muted); font-size: 11.5px; margin-top: 1px; }
  .row select { width: 100%; }
  .row.output-row, .row.cascade-row { grid-template-columns: 1fr 260px; }
  .output-controls, .cascade-controls { display: flex; gap: 4px; }
  .output-controls select, .cascade-controls select { flex: 1; min-width: 0; }
  .fixed-fact { color: var(--text); font-weight: 600; }
  .fixed-list { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .fixed-list code { color: var(--fixed); background: none; }
  code { background: #0a1013; padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  pre#draft {
    background: #0a1013; border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; font-size: 12.5px; line-height: 1.55; overflow-x: auto;
    white-space: pre; min-height: 200px;
  }
  .tbd-token { color: var(--tbd); font-weight: 700; }
  .summary { display: flex; gap: 18px; margin-bottom: 12px; font-size: 12.5px; }
  .summary .stat b { font-size: 16px; display: block; }
  .summary .stat.tbd b { color: var(--tbd); }
  .summary .stat.done b { color: #6fbf73; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
  .note {
    font-size: 12px; color: var(--muted); background: var(--panel);
    border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 16px;
  }
  .inline-field {
    font: inherit; font-size: 12.5px; font-family: inherit; color: var(--tbd);
    background: #1c262c; border: 1px solid var(--tbd); border-radius: 3px;
    padding: 0 4px; margin: 0 1px;
  }
  .inline-field.filled { color: #6fbf73; border-color: #6fbf73; }
  .inline-field:focus { outline: none; border-color: var(--accent); }
  input.inline-field { width: 9ch; }
  select.inline-field { max-width: 22ch; }
  .inline-field::placeholder { color: var(--muted); }
  .inline-btn {
    font: inherit; font-size: 10.5px; line-height: 1; cursor: pointer;
    background: var(--panel); color: var(--muted); border: 1px solid var(--border);
    border-radius: 3px; padding: 1px 4px; margin: 0 1px; vertical-align: middle;
  }
  .inline-btn:hover { color: var(--text); border-color: var(--accent); }
  .inline-btn.default-btn:hover { color: #6fbf73; border-color: #6fbf73; }
  .inline-btn.clear-btn:hover { color: #d9694a; border-color: #d9694a; }
  .attr-field {
    font: inherit; font-size: 10.5px; background: var(--panel); color: var(--muted);
    border: 1px solid var(--border); border-radius: 3px; padding: 0 2px; margin-left: 1px;
  }
  .attr-field.set { color: var(--accent); border-color: var(--accent); }
  .kin-select {
    font: inherit; font-size: 12.5px; font-family: inherit; color: var(--text);
    background: #1c262c; border: 1px solid var(--border); border-radius: 3px;
    padding: 0 2px; margin-left: -4px;
  }
</style>
</head>
<body>

<header>
  <h1>FluidNC Board Mapping Wizard</h1>
  <p>Prototype — resource-first walk (Phase A: bind board resources to roles) → draft config.yaml with TBD stubs (Phase B)</p>
  <select id="boardPicker" style="margin-left:auto"></select>
</header>

<main>
  <div class="col left" id="resourceCol">
    <div class="note" id="boardNote"></div>
  </div>
  <div class="col right">
    <div class="summary" id="summary"></div>
    <div class="toolbar">
      <button class="primary" onclick="copyDraft()">Copy</button>
      <button onclick="downloadDraft()">Download .yaml</button>
    </div>
    <pre id="draft">Bind some resources on the left -- the draft updates live.</pre>
  </div>
</main>

<script>
/* ---------------------------------------------------------------------
 * Embedded board files (from fluidnc-boards/boards/*.board.yaml).
 * In a non-prototype version these would be fetched or uploaded.
 * ------------------------------------------------------------------- */
const BOARD_YAML = {};

BOARD_YAML["6x_cnc_controller"] = `
board:
  id: 6x_cnc_controller
  name: "6x CNC Controller"
  manufacturer: "Dring Engineering Services"
  mcu_chip: esp32
  status: active
stepping:
  engines: [i2s]
fixed_peripherals:
  spi: { miso_pin: gpio.19, mosi_pin: gpio.23, sck_pin: gpio.18 }
  sdcard: { cs_pin: gpio.5 }
  i2so: { bck_pin: gpio.22, data_pin: gpio.21, ws_pin: gpio.17, pin_count: 24 }
motor_sockets:
  sockets:
    - label: "Motor1"
      driver_class: external_connector
      pins: { step_pin: i2so.2, direction_pin: i2so.1, disable_pin: i2so.0 }
    - label: "Motor2"
      driver_class: external_connector
      pins: { step_pin: i2so.5, direction_pin: i2so.4, disable_pin: i2so.7 }
    - label: "Motor3"
      driver_class: external_connector
      pins: { step_pin: i2so.10, direction_pin: i2so.9, disable_pin: i2so.8 }
    - label: "Motor4"
      driver_class: external_connector
      pins: { step_pin: i2so.13, direction_pin: i2so.12, disable_pin: i2so.15 }
    - label: "Motor5"
      driver_class: external_connector
      pins: { step_pin: i2so.18, direction_pin: i2so.17, disable_pin: i2so.16 }
    - label: "Motor6"
      driver_class: external_connector
      pins: { step_pin: i2so.21, direction_pin: i2so.20, disable_pin: i2so.23 }
generic_pins:
  - { label: "IO2",  mcu_pin: gpio.2,  direction: input, input_profile: { conditioning: opto_isolated } }
  - { label: "IO26", mcu_pin: gpio.26, direction: input, input_profile: { conditioning: opto_isolated } }
  - { label: "IO32", mcu_pin: gpio.32, direction: input, input_profile: { conditioning: opto_isolated } }
  - { label: "IO33", mcu_pin: gpio.33, direction: input, input_profile: { conditioning: opto_isolated } }
  - { label: "IO34", mcu_pin: gpio.34, direction: input, input_profile: { conditioning: opto_isolated } }
  - { label: "IO35", mcu_pin: gpio.35, direction: input, input_profile: { conditioning: opto_isolated } }
  - { label: "IO36", mcu_pin: gpio.36, direction: input, input_profile: { conditioning: opto_isolated } }
  - { label: "IO39", mcu_pin: gpio.39, direction: input, input_profile: { conditioning: opto_isolated } }
  - { label: "5V Out (shared w/ MOSFET1)", mcu_pin: gpio.4, direction: output, output_profile: { drive_type: totem_pole } }
  - { label: "MOSFET1", mcu_pin: gpio.4, direction: output, output_profile: { drive_type: mosfet_low_side } }
  - { label: "5V Out (shared w/ MOSFET2)", mcu_pin: gpio.12, direction: output, output_profile: { drive_type: totem_pole } }
  - { label: "MOSFET2", mcu_pin: gpio.12, direction: output, output_profile: { drive_type: mosfet_low_side } }
  - { label: "5V Out 3", mcu_pin: gpio.13, direction: output, output_profile: { drive_type: totem_pole } }
  - { label: "5V Out 4", mcu_pin: gpio.14, direction: output, output_profile: { drive_type: totem_pole } }
  - { label: "Spindle Fwd", mcu_pin: gpio.15, direction: output, output_profile: { drive_type: open_collector } }
  - { label: "Spindle Rev", mcu_pin: gpio.14, direction: output, output_profile: { drive_type: open_collector } }
rs485_channels:
  - { label: "RS485", tx_pin: gpio.15, rx_pin: gpio.16, rts_pin: gpio.14, pins_reusable_as_generic_io: true }
expansion_sockets:
  - label: "Expansion Module Socket"
    pins:
      - { module_pin: "1", mcu_pin: gpio.25, direction: bidirectional }
      - { module_pin: "2", mcu_pin: gpio.27, direction: bidirectional }
`;

BOARD_YAML["4x_cnc_controller"] = `
board:
  id: 4x_cnc_controller
  name: "4x CNC Controller (Integrated ESP32 and TMC2209)"
  manufacturer: "Dring Engineering Services"
  mcu_chip: esp32
  status: unverified
stepping:
  engines: [i2s]
fixed_peripherals:
  spi: { miso_pin: gpio.19, mosi_pin: gpio.23, sck_pin: gpio.18 }
  sdcard: { cs_pin: gpio.5 }
  i2so: { bck_pin: gpio.22, data_pin: gpio.21, ws_pin: gpio.17, pin_count: 16 }
  dedicated_uarts:
    - { label: "TMC2209 UART", txd_pin: gpio.26, rxd_pin: gpio.2, baud: 115200, mode: "8N1" }
motor_sockets:
  sockets:
    - label: "Motor1"
      driver_class: onboard_fixed
      fixed_motor_type: tmc_2209
      pins: { step_pin: i2so.2, direction_pin: i2so.1, disable_pin: i2so.0 }
      extra: { bus: uart1, addr: 0 }
    - label: "Motor2"
      driver_class: onboard_fixed
      fixed_motor_type: tmc_2209
      pins: { step_pin: i2so.5, direction_pin: i2so.4, disable_pin: i2so.7 }
      extra: { bus: uart1, addr: 1 }
    - label: "Motor3"
      driver_class: onboard_fixed
      fixed_motor_type: tmc_2209
      pins: { step_pin: i2so.10, direction_pin: i2so.9, disable_pin: i2so.8 }
      extra: { bus: uart1, addr: 2 }
    - label: "Motor4"

/* ---------------------------------------------------------------------
 * Role vocabularies. Real FluidNC has a larger set; this prototype covers
 * enough of it to demonstrate the resource-first walk + TBD stubbing.
 * ------------------------------------------------------------------- */
const AXES = ["x","y","z","a","b","c"];

/* Two-level role tree for motor sockets, built with the same generic
 * makeInputRow/N-level-cascade mechanism as input pins: top level picks the
 * axis, second level picks which motor slot on that axis (an axis can have
 * one or two motors -- motor0/motor1). Leaf value is "<letter>:<slot>"
 * (e.g. "x:motor0"), consumed directly by generateDraft()'s motor-socket
 * loop below (updated to match this 2-segment format, dropping the old
 * flat list's redundant "axis:" prefix). */
const MOTOR_ROLE_TREE = Object.fromEntries(AXES.map(ax => [ax, {
  label: `${ax.toUpperCase()} axis`,
  children: {
    motor0: { label: "First Motor" },
    motor1: { label: "Second Motor" },
  },
}]));

/* Multi-level role tree for input-capable pins. A node with no "children"
 * is a leaf -- picking it commits a value equal to the path of keys joined
 * by ":" (e.g. limit -> x -> neg => "limit:x:neg", control -> feed_hold =>
 * "control:feed_hold", probe => "probe:pin"). Depth varies by branch --
 * Limit is 3 levels deep incl. top (limit -> axis -> direction), Control
 * and Probe are 2 (category -> specific pin), User Input is 3 (category ->
 * digital/analog -> index) -- which is exactly why this needs a generic
 * N-level cascade rather than the fixed 2-level mechanism used for
 * output-capable pins. */
const INPUT_ROLE_TREE = {
  limit: {
    label: "Limit",
    children: Object.fromEntries(AXES.map(ax => [ax, {
      label: `${ax.toUpperCase()} axis`,
      children: {
        neg: { label: "Negative" },
        pos: { label: "Positive" },
        all: { label: "(shared/all)" },
      },
    }])),
  },
  /* Probe.h defines two distinct input pins, not one: _probePin (the
   * ordinary G38 probe) and _toolsetterPin (a second, separately-tripped
   * input for tool-length setting) -- confirmed in the connected FluidNC
   * source, Probe::group() (src/Probe.cpp): handler.item("pin", _probePin)
   * and handler.item("toolsetter_pin", _toolsetterPin). Child keys here are
   * literally the config field names, so the dispatch below needs no
   * lookup table -- it just writes cfg.probe[<child key>] = pin. */
  probe: {
    label: "Probe",
    children: {
      pin: { label: "Probe" },
      toolsetter_pin: { label: "Toolsetter" },
    },
  },
  /* Control.cpp's constructor registers ALL of these as siblings in the
   * one real "control:" config block (confirmed in the connected FluidNC
   * source) -- safety_door_pin, reset_pin, feed_hold_pin, cycle_start_pin,
   * macro0_pin..macro3_pin (4 macro buttons, not 2), fault_pin, estop_pin,
   * homing_button_pin. Macro buttons were previously modeled as their own
   * separate top-level UI category, which didn't match this real structure
   * -- folded in here as second-level Control children instead. Child keys
   * are each pin's real name minus its "_pin" suffix, so dispatch below
   * can build the real field name generically as `${key}_pin`. */
  control: {
    label: "Control",
    children: {
      feed_hold: { label: "Feed Hold" },
      cycle_start: { label: "Cycle Start" },
      reset: { label: "Reset" },
      safety_door: { label: "Safety Door" },
      fault: { label: "Fault" },
      estop: { label: "E-Stop" },
      homing_button: { label: "Homing Button" },
      macro0: { label: "Macro Button 0" },
      macro1: { label: "Macro Button 1" },
      macro2: { label: "Macro Button 2" },
      macro3: { label: "Macro Button 3" },
    },
  },
  /* Machine/UserInputs.cpp: a generic "user_inputs:" config block of plain
   * digital0_pin..digital7_pin (MaxUserDigitalPin = 8, from GCode.h) and
   * analog0_pin..analog3_pin (MaxUserAnalogPin = 4) slots, read by M66/M226
   * gcode -- these aren't tied to any specific machine function, just raw
   * user-assignable inputs, distinct from Limit/Probe/Control. */
  user_input: {
    label: "User Input",
    children: {
      digital: {
        label: "Digital",
        children: Object.fromEntries(Array.from({ length: 8 }, (_, i) => [String(i), { label: `Digital ${i}` }])),
      },
      analog: {
        label: "Analog",
        children: Object.fromEntries(Array.from({ length: 4 }, (_, i) => [String(i), { label: `Analog ${i}` }])),
      },
    },
  },
};

/* Spindle types each have a different pin set (verified against FluidNC's
 * actual Spindles/ source under FluidNC/src/Spindles/ -- read directly from
 * the connected FluidNC checkout, not assumed or scraped): PWM has output/
 * enable/direction; Laser subclasses PWM but its own group() deliberately
 * calls OnOff::groupCommon() instead of OnOff::group(), dropping direction
 * (lasers don't reverse); 10V adds forward/reverse on top of PWM's three
 * pins (separate direction-enable lines, distinct from a single
 * direction_pin); Relay/DAC are plain OnOff (output/enable/direction, no
 * pwm_hz -- neither overrides OnOff::group() to add it); BESC subclasses
 * PWM (same 3 pins + pwm_hz) and adds two of its own tunables; HBridge is
 * structurally different again -- output_cw_pin/output_ccw_pin/enable_pin,
 * no plain output_pin or direction_pin at all. cfgKey is each type's real
 * registered FluidNC config key (from `SpindleFactory::InstanceBuilder<..>
 * registration("...")` in each .cpp). stub() returns exactly the base
 * Spindle:: tuning fields each type's real group() chain actually exposes
 * -- e.g. Relay/DAC never get a spurious pwm_hz. NullSpindle (no pins) and
 * PlasmaSpindle (experimental; its arc_ok_pin is an INPUT coupled to this
 * same block, which this per-output-pin menu has no way to express yet)
 * are deliberately left out for now rather than modeled half-right. */
const SPINDLE_TYPES = {
  pwm:     { label: "PWM", cfgKey: "PWM",
             pins: [["output","Output"], ["enable","Enable"], ["direction","Direction"]],
             stub: () => ({ pwm_hz: "TBD", spinup_ms: "TBD", spindown_ms: "TBD", speed_map: "TBD", tool_num: 0 }) },
  laser:   { label: "Laser", cfgKey: "Laser",
             pins: [["output","Output"], ["enable","Enable"]],
             stub: () => ({ pwm_hz: "TBD", spinup_ms: "TBD", spindown_ms: "TBD", speed_map: "TBD", tool_num: 0 }) },
  "10v":   { label: "0-10V", cfgKey: "10V",
             pins: [["output","Output"], ["enable","Enable"], ["direction","Direction"], ["forward","Forward"], ["reverse","Reverse"]],
             stub: () => ({ pwm_hz: "TBD", spinup_ms: "TBD", spindown_ms: "TBD", speed_map: "TBD", tool_num: 0 }) },
  relay:   { label: "Relay (on/off)", cfgKey: "Relay",
             pins: [["output","Output"], ["enable","Enable"], ["direction","Direction"]],
             stub: () => ({ spinup_ms: "TBD", spindown_ms: "TBD", speed_map: "TBD", tool_num: 0 }) },
  dac:     { label: "DAC", cfgKey: "DAC",
             pins: [["output","Output"], ["enable","Enable"], ["direction","Direction"]],
             stub: () => ({ spinup_ms: "TBD", spindown_ms: "TBD", speed_map: "TBD", tool_num: 0 }) },
  besc:    { label: "BESC (RC ESC)", cfgKey: "BESC",
             pins: [["output","Output"], ["enable","Enable"], ["direction","Direction"]],
             stub: () => ({ pwm_hz: "TBD", spinup_ms: "TBD", spindown_ms: "TBD", speed_map: "TBD", tool_num: 0, min_pulse_us: "TBD", max_pulse_us: "TBD" }) },
  hbridge: { label: "H-Bridge", cfgKey: "HBridge",
             pins: [["output_cw","Output CW"], ["output_ccw","Output CCW"], ["enable","Enable"]],
             stub: () => ({ pwm_hz: "TBD", spinup_ms: "TBD", spindown_ms: "TBD", speed_map: "TBD", tool_num: 0 }) },
};

/* Machine/UserOutputs.cpp's real, firmware-enforced counts (GCode.h:
 * MaxUserDigitalPin = 8, MaxUserAnalogPin = 4), confirmed in the connected
 * FluidNC source -- not an arbitrary UI choice. An earlier version of this
 * file had DIGITAL_OUTPUT_COUNT wrong at 4; fixed here, and Analog Output
 * added as its own category since UserOutputs::group() exposes both
 * digitalN_pin and analogN_pin (plus analogN_hz, not yet modeled) under
 * the same "user_outputs:" block. */
const DIGITAL_OUTPUT_COUNT = 8;
const ANALOG_OUTPUT_COUNT = 4;

/* Generic two-step cascade lookup: given a step-1 category value, returns
 * the step-2 [value,label] options for it, or null if that category is
 * already a complete, non-cascading choice (coolant, unused). Spindle
 * types and digital outputs both go through this same mechanism -- it's
 * what keeps the primary dropdown from growing every time either set
 * grows (a new spindle type, or wanting more digital output slots). */
function cascadeOptionsFor(category) {
  if (category.startsWith("spindle:")) {
    const type = category.split(":")[1];
    return SPINDLE_TYPES[type] ? SPINDLE_TYPES[type].pins : null;
  }
  if (category === "digital_output") {
    return Array.from({ length: DIGITAL_OUTPUT_COUNT }, (_, i) => [String(i), `Output ${i}`]);
  }
  if (category === "analog_output") {
    return Array.from({ length: ANALOG_OUTPUT_COUNT }, (_, i) => [String(i), `Output ${i}`]);
  }
  if (category === "status_output") {
    return STATUS_OUTPUT_PINS;
  }
  return null;
}

/* Machine-state indicator outputs (e.g. tower lights) -- a real FluidNC
 * feature (Status_Outputs, confirmed in the connected FluidNC source,
 * status_outputs.cpp/h) that's independent of Limit/Probe/Control/Spindle/
 * Coolant/user I/O. All 5 real pins, per Status_Outputs::group(): idle_pin,
 * run_pin, hold_pin, alarm_pin, door_pin (the wiki's own example config
 * only shows 3 of these 5). */
const STATUS_OUTPUT_PINS = [
  ["idle", "Idle"], ["run", "Run"], ["hold", "Hold"], ["alarm", "Alarm"], ["door", "Door"],
];

/* Top-level category options for an output-capable pin -- step 1 of the
 * two-step menu. Spindle types and "Digital Output" are cascading
 * categories (picking one reveals step 2); coolant is already a single
 * flat choice per option, same as before. */
function outputCategoryOptions() {
  const opts = [{ value: "unused", label: "— Unused —" }];
  Object.keys(SPINDLE_TYPES).forEach(t => opts.push({ value: `spindle:${t}`, label: `Spindle — ${SPINDLE_TYPES[t].label}` }));
  opts.push({ value: "coolant:flood", label: "Coolant — Flood" });
  opts.push({ value: "coolant:mist", label: "Coolant — Mist" });
  opts.push({ value: "digital_output", label: "Digital Output" });
  opts.push({ value: "analog_output", label: "Analog Output" });
  opts.push({ value: "status_output", label: "Status Output" });
  return opts;
}

/* Split a full role value into its category (step 1) and, for cascading
 * categories, the specific sub-value chosen in step 2. */
function roleCategory(full) {
  if (!full || full === "unused") return "unused";
  const parts = full.split(":");
  if (parts[0] === "spindle") return `spindle:${parts[1]}`;
  if (parts[0] === "digital_output") return "digital_output";
  if (parts[0] === "analog_output") return "analog_output";
  if (parts[0] === "status_output") return "status_output";
  return full;
}
function roleSubValue(full) {
  const parts = (full || "").split(":");
  if (parts[0] === "spindle") return parts[2];
  if (parts[0] === "digital_output") return parts[1];
  if (parts[0] === "analog_output") return parts[1];
  if (parts[0] === "status_output") return parts[1];
  return undefined;
}

/* The model choice fully determines the resulting block's shape (the
 * modern FluidNC form is a single ModbusVFD: block with a model: field --
 * the old per-model top-level key like Huanyang: still works but is
 * strictly a backwards-compatibility alias), so it's folded into the
 * resource's role choice itself rather than asked as a separate Phase B
 * fill-in, same pattern as fixed_motor_type dispatching a motor socket's
 * wrapper key. Model list is every concrete VFD model implemented under
 * FluidNC/src/Spindles/VFD/ in the bdring/FluidNC source as of this
 * writing (confirmed against the actual repo, not from memory) -- re-check
 * that directory if this needs to grow later. */
function rs485RoleOptions() {
  const models = [
    "DanfossVLT2800", "DeltaMS300", "FolinnBD600", "H100", "H2A",
    "Huanyang", "MollomG70", "NowForever", "SiemensV20", "YL620"
  ];
  return [
    { value: "unused", label: "— Unused —" },
    ...models.map(m => ({ value: `vfd:${m}`, label: `Modbus VFD Spindle — ${m}` }))
  ];
}

/* Kinematics is a machine-level (not board-resource-tied) choice -- every
 * board can, in principle, host any kinematic system, so unlike motor
 * sockets/pins/RS485 this isn't walked from board.* facts. Confirmed
 * against the connected FluidNC source: Kinematics::afterParse() defaults
 * _system to a plain Cartesian when the config's "kinematics:" section (or
 * its subordinate system name) is absent, so Cartesian-with-no-subordinate-
 * items is the correct, real default -- not just a UI convenience. Other
 * compiled-in systems (see src/CMakeLists.txt's Kinematics/*.cpp list;
 * PolarArm.hx and the .cppx/.orig files alongside them are NOT compiled)
 * each register under a specific factory name and some define their own
 * subordinate config items via group() -- CoreXY and Midtbot genuinely
 * have empty group() overrides (no subordinate items at all), while
 * ParallelDelta and WallPlotter each expose a real, fixed set of geometry
 * fields. cfgKey is each type's exact registered factory name (case-
 * sensitive, confirmed from each .cpp's `KinematicsFactory::InstanceBuilder
 * registration("...")` call -- note midtbot/parallel_delta are lowercase,
 * unlike Cartesian/CoreXY/WallPlotter). stub() returns exactly the fields
 * each type's real group() exposes, TBD-stubbed like every other role. */
const KINEMATICS_TYPES = {
  Cartesian:      { cfgKey: "Cartesian", label: "Cartesian (default)", stub: () => ({}) },
  CoreXY:         { cfgKey: "CoreXY", label: "CoreXY", stub: () => ({}) },
  midtbot:        { cfgKey: "midtbot", label: "Midtbot", stub: () => ({}) },
  parallel_delta: { cfgKey: "parallel_delta", label: "Parallel Delta",
                    stub: () => ({
                      crank_mm: "TBD", base_triangle_mm: "TBD", linkage_mm: "TBD",
                      end_effector_triangle_mm: "TBD", kinematic_segment_len_mm: "TBD",
                      use_servos: "TBD", up_degrees: "TBD",
                    }) },
  WallPlotter:    { cfgKey: "WallPlotter", label: "Wall Plotter",
                    stub: () => ({
                      left_axis: "TBD", left_anchor_x: "TBD", left_anchor_y: "TBD",
                      right_axis: "TBD", right_anchor_x: "TBD", right_anchor_y: "TBD",
                      segment_length: "TBD",
                    }) },
};

function kinematicsOptions() {
  return Object.keys(KINEMATICS_TYPES).map(k => ({ value: k, label: KINEMATICS_TYPES[k].label }));
}

/* Confirmed against real vendor documentation (4x controller wiki's own
 * "UARTS" section, verbatim): "UART0 is used for the USB/Serial port.
 * UART1 is used for the TMC2209 drivers. UART2 is the only one left to the
 * user. This means if you use it for the RS485, there are non left for
 * pendants, display, etc." -- i.e. a board with UART-addressed onboard TMC
 * drivers (detected via any motor socket's extra.bus === "uart1", a real
 * board fact already recorded for such boards) has already consumed
 * uart_num 1, so the one remaining non-USB UART for RS485/expansion is 2;
 * a board without such drivers (6x, Corgi) defaults to 1. This is a
 * WIZARD-level default, applied identically to whichever of RS485/
 * expansion UART a config actually binds -- deliberately NOT arbitrated
 * further than that, because on a TMC-UART board both would default to
 * the same remaining number 2 and only one can really be used at once
 * (confirmed by the 4x wiki's own commented-out RS485 example, which
 * literally warns "Be sure pendant is not using UART 2" and uses
 * uart_num: 2 for RS485 in that scenario) -- a genuine hardware limit (the
 * ESP32 only has 3 UART peripherals total), not a wizard bug to engineer
 * around. */
function boardHasUartTmc(b) {
  return !!(b.motor_sockets && b.motor_sockets.sockets &&
    b.motor_sockets.sockets.some(s => s.extra && s.extra.bus === "uart1"));
}
function defaultSecondaryUartNum(b) {
  return boardHasUartTmc(b) ? 2 : 1;
}

/* ---------------------------------------------------------------------
 * State
 * ------------------------------------------------------------------- */
let board = null;          // parsed board object
let bindings = {};         // resourceKey -> role value string
let paramValues = {};      // JSON-pointer-ish path (e.g. "axes.x.steps_per_mm") -> user-entered value
let pinAttrs = {};         // path -> { level: ""|"low"|"high", pull: ""|"pu"|"pd" }
let kinematicsType = "Cartesian"; // selected top-level kinematics system, defaults to Cartesian
/* Start: is another machine-level (not board-resource-tied) section, same
 * category as Kinematics -- confirmed against the connected FluidNC source
 * (Machine::Start, defined inline in src/Machine/MachineConfig.h): a plain
 * Configurable with exactly 3 bool fields, no enum/factory involved:
 * must_home/check_limits default true, deactivate_parking defaults false
 * (MachineConfig.h's own member initializers). The section itself is
 * optional in config.yaml (MachineConfig::afterParse() auto-instantiates a
 * default Start() if absent), but the wizard always emits it directly into
 * the draft (see generateDraft()'s Start block) with must_home left open
 * TBD (a real decision) and the other two pre-populated with these same
 * compiled-in defaults, editable inline -- no separate left-pane UI state
 * needed for this section at all. */
let chipGpioCaps = {};     // gpio number -> chip-file gpio fact object (see loadBoard()/pinWidgetHtml())
let lastPlainYaml = "";    // current draft as plain text (TBD where still unanswered) -- for copy/download
/* Per-axis homing: presence -- FluidNC's homing: sub-section is genuinely
 * optional (an axis with no homing: entry simply can't be homed), so unlike
 * the always-present axis fields (steps_per_mm etc.), it should NOT be
 * pre-populated with TBD stubs for every axis by default. Same "selector
 * lives inside the draft itself" pattern as Kinematics (see KINSELECT):
 * ensureAxis() plants a HOMINGSELECT_<letter> sentinel as homing:'s own
 * VALUE (unlike KINSELECT, which replaces a KEY, this replaces a VALUE --
 * homing:'s value is what varies, not its key name -- so no colon-stripping
 * trick is needed here; it's collected/replaced exactly like TBD/PINSLOT).
 * Defaults to false (No homing) for every axis until the user explicitly
 * turns it on; the final copy/download output omits the homing: key
 * entirely for any axis left disabled, rather than emitting the sentinel
 * or an empty/TBD block. */
let homingEnabled = {};    // axis letter -> bool, defaults to false (falsy) if unset

/* Any leaf whose key names a pin (ends in "_pin", or is exactly "pin" for
 * probe.pin) and whose value is a real, board-derived pin reference (not
 * the TBD sentinel, not NO_PIN -- there's nothing to attribute-tag on
 * either of those) is eligible for FluidNC pin attributes like :low/:pu. */
function isPinLeaf(key, value) {
  if (typeof value !== "string") return false;
  if (value === "TBD" || value === "NO_PIN") return false;
  return key.endsWith("_pin") || key === "pin";
}

/* Pins feeding a fixed hardware protocol/bus -- spi:, sdcard:, i2so:, i2c:,
 * and any uartN: block (whether from a dedicated onboard TMC bus, an
 * RS485/VFD channel, or an expansion_uart's uart_channel) -- are not
 * eligible for :low/:high/:pu/:pd attributes at all: the protocol itself
 * dictates specific, fixed signal levels/timing (SPI/I2S clock polarity,
 * UART idle-high framing at a specific baud, etc.), so there's no
 * per-machine choice to make here, unlike a limit switch or spindle output
 * pin. These render as plain, non-widget text in the draft. Distinct from
 * motor_sockets/generic_pins/expansion_sockets/rs485_channels pins, which
 * ARE real per-machine wiring choices (active-low switch, pull resistor
 * needed, etc.) and keep their attribute widgets. */
function isFixedProtocolPath(path) {
  // NOTE: i2c0/i2c1/etc. (numbered, matching the real FluidNC config key --
  // see the i2c_connectors handling in generateDraft()) intentionally IS
  // still treated as a fixed-protocol bus here, even though whether it's
  // used at all is now a config-author choice (no longer a fixed
  // peripheral): once bound, its sda_pin/scl_pin are still I2C-protocol
  // pins with fixed signal requirements, same reasoning as spi/sdcard/i2so.
  return /^(spi|sdcard|i2so|i2c\d*)\./.test(path) || /^uart\d+\./.test(path);
}

/* ---------------------------------------------------------------------
 * Phase B field vocabulary: how to render a widget for a given open TBD,
 * keyed by the leaf key name. Real FluidNC has more fields than this
 * prototype models; unknown keys fall back to a plain text box.
 * ------------------------------------------------------------------- */
function specForKey(key) {
  // defaultKind: "firmware"  -- this is FluidNC's own documented default
  //              "suggested" -- just a common/reasonable starting point,
  //                             not a spec value -- verify for your hardware
  // Placeholder is always just the default value itself -- no separate
  // hand-written hint text to keep in sync.
  const numeric = (def, defaultKind) => ({ type: "number", placeholder: String(def), default: def, defaultKind });
  switch (key) {
    case "soft_limits":
      return { type: "enum", options: [["true","true — Yes"], ["false","false — No"]], default: "false", defaultKind: "firmware" };
    // Machine::Start's 3 fields (src/Machine/MachineConfig.h) -- must_home
    // is left with no override (an open decision), deactivate_parking/
    // check_limits get one in generateDraft() (pre-populated, editable).
    case "must_home":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "true", defaultKind: "firmware" };
    case "deactivate_parking":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "false", defaultKind: "firmware" };
    case "check_limits":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "true", defaultKind: "firmware" };
    // MachineConfig's 7 uncategorized top-level items (MachineConfig.cpp:
    // 83-89 / MachineConfig.h member initializers) -- see their
    // defaultOverrides entries in generateDraft(), which pre-populate
    // these from the real compiled-in defaults below rather than leaving
    // them open.
    case "arc_tolerance_mm": return numeric(0.002, "firmware");
    case "junction_deviation_mm": return numeric(0.01, "firmware");
    case "verbose_errors":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "true", defaultKind: "firmware" };
    case "report_inches":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "false", defaultKind: "firmware" };
    case "enable_parking_override_control":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "false", defaultKind: "firmware" };
    case "use_line_numbers":
      return { type: "enum", options: [["true","true"], ["false","false"]], default: "false", defaultKind: "firmware" };
    case "planner_blocks": return numeric(16, "firmware");
    case "cycle":
      return numeric(1, "suggested");
    case "positive_direction":
      return { type: "enum", options: [["true","true — Positive (toward max)"], ["false","false — Negative (toward min)"]], default: "false", defaultKind: "firmware" };
    case "mpos_mm": return numeric(0, "suggested");
    case "feed_mm_per_min": return numeric(100, "suggested");
    case "seek_mm_per_min": return numeric(200, "suggested");
    case "settle_ms": return numeric(500, "firmware");
    case "seek_scaler": return numeric(1.1, "firmware");
    case "feed_scaler": return numeric(1.1, "firmware");
    case "microsteps":
      return { type: "enum", options: [1,2,4,8,16,32,64,128,256].map(n => [String(n), String(n)]), default: "16", defaultKind: "suggested" };
    case "idle_ms": return numeric(255, "firmware");
    case "pulse_us": return numeric(4, "firmware");
    case "dir_delay_us": return numeric(1, "firmware");
    case "disable_delay_us": return numeric(0, "firmware");
    case "steps_per_mm": return numeric(100, "suggested");
    case "max_rate_mm_per_min": return numeric(5000, "suggested");
    case "acceleration_mm_per_sec2": return numeric(100, "suggested");
    case "max_travel_mm": return numeric(300, "suggested");
    case "r_sense_ohms": return numeric(0.11, "suggested");
    case "run_amps": return numeric(1.0, "suggested");
    case "hold_amps": return numeric(0.5, "suggested");
    case "cal_min_mm": return numeric(0, "suggested");
    case "cal_max_mm": return numeric(30, "suggested");
    case "pwm_hz": return numeric(5000, "firmware");
    case "spinup_ms": case "spindown_ms": return numeric(0, "firmware");
    case "tool_num": return numeric(0, "firmware");
    case "speed_map": return { type: "text", placeholder: "0=0% 10000=100%", default: "0=0% 10000=100%", defaultKind: "firmware" };
    case "addr": return numeric(0, "suggested");
    case "modbus_id": return numeric(1, "suggested");
    case "min_pulse_us": return numeric(900, "firmware");
    case "max_pulse_us": return numeric(2200, "firmware");
    case "uart_num": return numeric(2, "suggested");
    // Only ever open TBD fields for a repurposed I2C-connector-as-UART
    // (see i2c_connectors handling in generateDraft()) -- a dedicated
    // expansion_uart connector's baud/mode are fixed board facts instead,
    // never TBD. 115200/8N1 are plain common-UART conventions, not a
    // FluidNC-specific default.
    case "baud": return numeric(115200, "suggested");
    case "mode": return { type: "text", placeholder: "8N1", default: "8N1", defaultKind: "suggested" };
    // Status_Outputs' real compiled default (Status_outputs.h: int32_t
    // _report_interval_ms = 500), confirmed against the connected FluidNC
    // source -- also used, as a reasonable starting point, for
    // uart_channel's field of the same name (whose own real default isn't
    // separately verified, but 75ms from wiki examples wasn't a firmware
    // default either).
    case "report_interval_ms": return numeric(500, "firmware");
    // ParallelDelta geometry -- defaults are the compiled-in member
    // initializers in Kinematics/ParallelDelta.h, confirmed against the
    // connected FluidNC source (a specific delta arm's real dimensions,
    // not universal -- every real machine must override these).
    case "crank_mm": return numeric(70.0, "firmware");
    case "base_triangle_mm": return numeric(179.437, "firmware");
    case "linkage_mm": return numeric(133.50, "firmware");
    case "end_effector_triangle_mm": return numeric(86.603, "firmware");
    case "kinematic_segment_len_mm": return numeric(1.0, "firmware");
    case "use_servos": return { type: "enum", options: [["true","true — Yes"], ["false","false — No"]], default: "false", defaultKind: "firmware" };
    case "up_degrees": return numeric(-30, "firmware");
    // WallPlotter geometry -- same provenance (Kinematics/WallPlotter.h
    // member initializers), a specific two-cord layout, not universal.
    case "left_axis": return numeric(0, "firmware");
    case "left_anchor_x": return numeric(-100, "firmware");
    case "left_anchor_y": return numeric(100, "firmware");
    case "right_axis": return numeric(1, "firmware");
    case "right_anchor_x": return numeric(100, "firmware");
    case "right_anchor_y": return numeric(100, "firmware");
    case "segment_length": return numeric(10, "firmware");
    default: return { type: "text", placeholder: "" };
  }
}

/* Walk a freshly-cloned cfg and, in one pass, in the same order jsyaml.dump
 * will visit it: (a) record every "TBD" slot as before, and (b) replace
 * every real pin leaf with the sentinel "PINSLOT" (recording its original
 * value), so the dumped text's tokens can be swapped for widgets below.
 * This mutates `node` -- always call it on a clone, never the real cfg. */
/* defaultOverrides: optional path -> {default, defaultKind} map, for the
 * rare TBD field whose sensible default genuinely varies by BOARD (or even
 * by specific motor socket), not just by field name -- e.g. r_sense_ohms
 * is normally a generic per-driver-family guess (specForKey's plain
 * default), but a board can document its own, verified-correct value for
 * its own onboard chips (e.g. BTT Rodent's real 0.075 ohm sense resistor,
 * vs. the erroneous 0.022 its own schematic/example configs show) -- see
 * where motorBlockFor()'s tmc_5160 branch records such an override during
 * the motor-socket loop in generateDraft(). Merged over specForKey(k)'s
 * result so unrelated fields are unaffected. */
function collectAndInjectSlots(node, path, paramSlots, pinSlots, defaultOverrides) {
  if (!node || typeof node !== "object") return;
  Object.keys(node).forEach(k => {
    const v = node[k];
    const p = path ? `${path}.${k}` : k;
    if (v === "TBD") {
      const override = defaultOverrides && defaultOverrides[p];
      // NOTE: also re-derive placeholder from the override's own default --
      // otherwise the merge below only changes spec.default/defaultKind
      // (used by the "def" button), while the input's visible placeholder
      // text -- what the user actually sees without clicking anything --
      // would keep showing specForKey(k)'s generic value (e.g. 0.11 for any
      // r_sense_ohms field) instead of the board's real, overriding one
      // (e.g. BTT Rodent's documented 0.075), silently defeating the whole
      // point of a board-specific override.
      const spec = override
        ? Object.assign({}, specForKey(k), override, { placeholder: String(override.default) })
        : specForKey(k);
      // A board-specific override isn't a mere suggestion the way
      // specForKey's generic per-field guesses are -- it's a documented,
      // verified-correct fact about THIS board's own hardware (e.g. the
      // Rodent's real 0.075 ohm sense resistor). So unlike an ordinary
      // TBD field (which stays open until the user clicks "def" or types a
      // value), an overridden field is pre-filled as the actual current
      // value immediately -- no click required -- rather than left as a
      // placeholder the user must notice and act on. Only pre-fills if the
      // user hasn't already set (or explicitly cleared) this exact path,
      // so a real edit is never silently clobbered.
      if (override && override.default !== undefined &&
          !Object.prototype.hasOwnProperty.call(paramValues, p)) {
        paramValues[p] = override.default;
      }
      paramSlots.push({ path: p, key: k, spec });
    } else if (isPinLeaf(k, v) && !isFixedProtocolPath(p)) {
      pinSlots.push({ path: p, key: k, basePin: v });
      node[k] = "PINSLOT";
    } else if (v && typeof v === "object") {
      collectAndInjectSlots(v, p, paramSlots, pinSlots, defaultOverrides);
    }
  });
}

function setParam(path, key, rawValue) {
  const spec = specForKey(key);
  if (rawValue === "" || rawValue === undefined) {
    delete paramValues[path];
  } else if (spec.type === "number") {
    const n = Number(rawValue);
    if (Number.isNaN(n)) delete paramValues[path]; else paramValues[path] = n;
  } else if (spec.type === "enum" && (rawValue === "true" || rawValue === "false")) {
    paramValues[path] = rawValue === "true";
  } else if (spec.type === "enum") {
    const n = Number(rawValue);
    paramValues[path] = Number.isNaN(n) ? rawValue : n;
  } else {
    paramValues[path] = rawValue;
  }
  generateDraft();
}

function setPinAttr(path, which, value) {
  if (!pinAttrs[path]) pinAttrs[path] = { level: "", pull: "" };
  pinAttrs[path][which] = value;
  generateDraft();
}

function escapeAttr(s) {
  return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;");
}

function paramWidgetHtml(slot) {
  const has = Object.prototype.hasOwnProperty.call(paramValues, slot.path);
  const cls = "inline-field" + (has ? " filled" : "");
  let html;
  if (slot.spec.type === "enum") {
    const cur = has ? String(paramValues[slot.path]) : "";
    let opts = `<option value="">TBD</option>`;
    slot.spec.options.forEach(([val, label]) => {
      opts += `<option value="${escapeAttr(val)}"${val === cur ? " selected" : ""}>${escapeHtml(label)}</option>`;
    });
    html = `<select class="${cls}" data-path="${escapeAttr(slot.path)}" data-key="${escapeAttr(slot.key)}">${opts}</select>`;
  } else {
    const cur = has ? paramValues[slot.path] : "";
    const type = slot.spec.type === "number" ? "number" : "text";
    const step = slot.spec.type === "number" ? ` step="any"` : "";
    html = `<input class="${cls}" type="${type}"${step} placeholder="${escapeAttr(slot.spec.placeholder || "TBD")}" value="${escapeAttr(cur)}" data-path="${escapeAttr(slot.path)}" data-key="${escapeAttr(slot.key)}">`;
  }
  if (slot.spec.default !== undefined) {
    const kindLabel = slot.spec.defaultKind === "firmware" ? "FluidNC firmware default"
      : slot.spec.defaultKind === "board" ? "this board's own documented/corrected value"
      : "suggested starting value — verify for your hardware";
    html += `<button type="button" class="inline-btn default-btn" data-path="${escapeAttr(slot.path)}" data-key="${escapeAttr(slot.key)}" data-default="${escapeAttr(slot.spec.default)}" title="Set ${kindLabel}: ${escapeAttr(slot.spec.default)}">def</button>`;
  }
  html += `<button type="button" class="inline-btn clear-btn" data-path="${escapeAttr(slot.path)}" data-key="${escapeAttr(slot.key)}" title="Clear (back to TBD)">✕</button>`;
  return html;
}

/* FluidNC pin attributes: :low/:high (active level) and :pu/:pd (pull
 * resistor) can be attached to any real pin reference. The base pin itself
 * (a board-derived fact) is shown read-only; these two small pickers just
 * append the optional suffixes. */
function pinWidgetHtml(slot) {
  const attrs = pinAttrs[slot.path] || { level: "", pull: "" };
  const levelOpts = [["", "—"], ["low", ":low"], ["high", ":high"]];
  const pullOpts = [["", "—"], ["pu", ":pu"], ["pd", ":pd"]];
  // I2SO pins are outputs of an external shift register, not real GPIOs --
  // they have no pull-up/pull-down capability at all, so no chip lookup
  // applies to them. Real gpio.* pins: consult the board's mcu_chip file
  // (chipGpioCaps, built in loadBoard()) for the true per-pin pullup/
  // pulldown capability -- e.g. the ESP32's own input-only pins (34-39)
  // have neither, a chip-level fact, not a board-level one (per explicit
  // user direction: this should be sourced from the chip file, not
  // restated/guessed per board).
  let supportsPull = !slot.basePin.startsWith("i2so.");
  if (supportsPull && slot.basePin.startsWith("gpio.")) {
    const num = parseInt(slot.basePin.slice(5), 10);
    const caps = chipGpioCaps[num];
    if (caps) supportsPull = !!(caps.pullup || caps.pulldown);
  }
  let html = `<span class="fixed-fact">${escapeHtml(slot.basePin)}</span>`;
  html += `<select class="attr-field${attrs.level ? " set" : ""}" data-path="${escapeAttr(slot.path)}" data-attr="level" title="Active level (:low / :high)">` +
    levelOpts.map(([v,l]) => `<option value="${v}"${attrs.level===v?" selected":""}>${l}</option>`).join("") + `</select>`;
  if (supportsPull) {
    html += `<select class="attr-field${attrs.pull ? " set" : ""}" data-path="${escapeAttr(slot.path)}" data-attr="pull" title="Pull resistor (:pu / :pd)">` +
      pullOpts.map(([v,l]) => `<option value="${v}"${attrs.pull===v?" selected":""}>${l}</option>`).join("") + `</select>`;
  }
  return html;
}

/* Build the inline-editable HTML for the <pre>: every "TBD" or "PINSLOT"
 * token in the dumped YAML text is replaced, in order, by the matching
 * widget -- editable right where it sits in the document, pre-filled if
 * already answered, so fixing a mistake is just clicking the same spot
 * again rather than hunting a separate list. */
const HOMING_SENTINEL_RE = new RegExp(`^HOMINGSELECT_(${AXES.join("|")})$`);

function buildInteractiveYaml(yamlText, paramSlots, pinSlots) {
  const tokens = yamlText.split(/(TBD|PINSLOT|KINSELECT|HOMINGSELECT_[a-z]+)/);
  let html = "";
  let pi = 0, si = 0;
  let stripLeadingColon = false;
  tokens.forEach(tok => {
    const homingMatch = tok.match(HOMING_SENTINEL_RE);
    if (tok === "TBD") {
      html += paramWidgetHtml(paramSlots[pi++]);
    } else if (tok === "PINSLOT") {
      html += pinWidgetHtml(pinSlots[si++]);
    } else if (tok === "KINSELECT") {
      // kinWidgetHtml() already appends its own trailing ":" as part of the
      // label -- the very next chunk of yamlText is js-yaml's own literal
      // ": " for this same key, which would otherwise duplicate it right
      // after the select's arrow. Strip exactly that one leading colon
      // from the next plain-text chunk.
      html += kinWidgetHtml();
      stripLeadingColon = true;
    } else if (homingMatch) {
      // Same KEY-replacement idea as KINSELECT (not a value-position
      // sentinel): this axis's homing entry is keyed by
      // HOMINGSELECT_<letter> in `cfg` itself (see ensureAxis()), whether
      // enabled or not, so the selector always sits exactly where the real
      // "homing:" key belongs -- a non-existent homing: section really is
      // different from an empty one, so the interactive view shouldn't
      // show homing: at all when disabled, only this selector. The
      // following literal ": " (plus a literal "null" when disabled) is
      // js-yaml's own text for this same key/value and needs stripping,
      // same reasoning as KINSELECT.
      html += homingWidgetHtml(homingMatch[1]);
      stripLeadingColon = true;
    } else {
      html += escapeHtml(stripLeadingColon ? tok.replace(/^:(\s*null)?/, "") : tok);
      stripLeadingColon = false;
    }
  });
  return html;
}

/* Kinematics system selector -- lives INSIDE the generated draft itself
 * (right pane), not the left pane's resource-assignment list, since it
 * isn't a board-resource binding at all (any board can in principle host
 * any kinematic system -- see KINEMATICS_TYPES' own declaration comment).
 * Implemented the same way PINSLOT/TBD are: generateDraft() plants a
 * literal "KINSELECT" sentinel as the kinematics: block's own key (see
 * `cfg.kinematics = { KINSELECT: kt.stub() }`), which survives js-yaml's
 * dump as plain unquoted text and gets tokenized out here exactly like any
 * other sentinel, then replaced with a real <select>. Wired up alongside
 * the other #draft widget classes in generateDraft(). */
function kinWidgetHtml() {
  // Option text is each system's real cfgKey (Cartesian/CoreXY/midtbot/
  // parallel_delta/WallPlotter) -- i.e. exactly the section-name text that
  // ends up in the actual key position, not KINEMATICS_TYPES' more
  // elaborated display label (e.g. "Parallel Delta") -- so the dropdown,
  // sitting inline where a YAML key normally goes, still reads like a
  // real, valid config file rather than an elaborated UI description.
  // The ":" is baked into each option's own text (not appended after
  // </select>) so it reads "Cartesian:" BEFORE the native dropdown arrow,
  // exactly where a real YAML key's colon belongs -- a colon placed after
  // the closing </select> tag would render after the arrow instead, which
  // looks wrong (a native <select>'s arrow is always the box's last visual
  // element; nothing can be placed between the label text and the arrow
  // except by putting it inside the option text itself).
  let html = `<select class="kin-select">`;
  Object.keys(KINEMATICS_TYPES).forEach(k => {
    const cfgKey = KINEMATICS_TYPES[k].cfgKey;
    html += `<option value="${escapeAttr(k)}"${k === kinematicsType ? " selected" : ""}>${escapeHtml(cfgKey)}:</option>`;
  });
  html += `</select>`;
  return html;
}

/* Per-axis homing: presence selector -- see homingEnabled's own declaration
 * comment. Same KEY-replacement idea as kinWidgetHtml(): this axis's own
 * homing entry is keyed by HOMINGSELECT_<letter> in `cfg`/`liveCfg`
 * regardless of state (see ensureAxis()), so the selector always sits
 * exactly at the position homing:'s KEY would occupy -- when disabled, no
 * "homing:" text appears anywhere, only this selector (a non-existent
 * section really is different from an empty one). Only the enabled
 * option's text bakes in a trailing ":" (matching the real "homing:" key
 * text, before the arrow, same reasoning as kinWidgetHtml's cfgKey
 * options) -- the disabled option deliberately has none, since "No
 * homing" never becomes a real YAML key at all. */
function homingWidgetHtml(letter) {
  const enabled = !!homingEnabled[letter];
  let html = `<select class="homing-select" data-letter="${escapeAttr(letter)}">`;
  html += `<option value="false"${enabled ? "" : " selected"}>— No homing —</option>`;
  html += `<option value="true"${enabled ? " selected" : ""}>homing:</option>`;
  html += `</select>`;
  return html;
}

function resourceKeyMotor(i) { return `motor:${i}`; }
function resourceKeyPin(i) { return `pin:${i}`; }
function resourceKeyExp(si, pi) { return `exp:${si}:${pi}`; }
function resourceKeyRs485(i) { return `rs485:${i}`; }
function resourceKeyExpUart(i) { return `expuart:${i}`; }
function resourceKeyI2c(i) { return `i2c:${i}`; }

/* ---------------------------------------------------------------------
 * Rendering
 * ------------------------------------------------------------------- */
function loadBoard(id) {
  board = jsyaml.load(BOARD_YAML[id]);
  bindings = {};
  paramValues = {};
  pinAttrs = {};
  kinematicsType = "Cartesian";
  homingEnabled = {};
  // Build a per-GPIO-number capability lookup from this board's referenced
  // mcu_chip file (see pinWidgetHtml()'s use of chipGpioCaps) -- chip-level
  // facts (pullup/pulldown support etc.) belong here, not in the board file.
  chipGpioCaps = {};
  const chipId = board.board && board.board.mcu_chip;
  if (chipId && CHIP_YAML[chipId]) {
    const chip = jsyaml.load(CHIP_YAML[chipId]);
    (chip.gpio || []).forEach(g => { chipGpioCaps[g.pin] = g; });
  }
  renderResources();
  generateDraft();
}

function renderResources() {
  const col = document.getElementById("resourceCol");
  col.innerHTML = "";

  const note = document.createElement("div");
  note.className = "note";
  note.innerHTML = `<b>${board.board.name}</b> (${board.board.manufacturer}) — ` +
    `stepping engine(s): <code>${(board.stepping.engines||[]).join(", ")}</code>. ` +
    `Each row below is one physical board resource (from the board file). Pick the FluidNC ` +
    `role it plays, or leave it Unused. This is Phase A — resource → role binding.`;
  col.appendChild(note);

  // Kinematics has NO left-pane row -- the left pane is pure board-resource
  // assignment, and a kinematic system choice isn't tied to any board
  // resource at all (any board can in principle host any kinematic
  // system). The selector itself now lives INSIDE the generated draft (see
  // kinWidgetHtml()/the KINSELECT sentinel in generateDraft()), right where
  // the kinematics: block's system-name key sits, defaulting to Cartesian
  // per FluidNC's own real default (Kinematics::afterParse()). Choosing a
  // system with subordinate geometry items (Parallel Delta, Wall Plotter)
  // auto-populates them as ordinary TBD fields alongside it.

  // Start: has NO left-pane row either -- same reasoning as Kinematics.
  // It's always emitted directly into the draft below with its fields
  // already inline-editable there (see generateDraft()'s Start block):
  // must_home is left genuinely TBD (whether homing should be required is a
  // real decision), while deactivate_parking/check_limits are pre-populated
  // with FluidNC's own compiled-in defaults via the same defaultOverrides
  // mechanism used for board-specific hints -- rarely-changed settings the
  // user need not think about, but can still edit inline if they want to.

  // Fixed peripherals — informational only, not assignable.
  if (board.fixed_peripherals) {
    const sec = document.createElement("section");
    sec.innerHTML = `<h2>Fixed peripherals (already known, not assignable)</h2>`;
    const list = document.createElement("div");
    list.className = "fixed-list";
    const fp = board.fixed_peripherals;
    const lines = [];
    if (fp.spi) lines.push(`SPI bus: <code>${JSON.stringify(fp.spi)}</code>`);
    if (fp.sdcard) lines.push(`SD card: <code>${JSON.stringify(fp.sdcard)}</code>`);
    if (fp.i2so) lines.push(`I2SO shift register: <code>${JSON.stringify(fp.i2so)}</code>`);
    if (fp.dedicated_uarts) fp.dedicated_uarts.forEach(u => lines.push(`Dedicated UART (${u.label}): <code>${JSON.stringify(u)}</code>`));
    list.innerHTML = lines.join("<br>");
    sec.appendChild(list);
    col.appendChild(sec);
  }

  // Motor sockets
  if (board.motor_sockets && board.motor_sockets.sockets) {
    const sec = document.createElement("section");
    sec.innerHTML = `<h2>Motor sockets</h2>`;
    board.motor_sockets.sockets.forEach((s, i) => {
      const key = resourceKeyMotor(i);
      sec.appendChild(makeInputRow(
        key, s.label,
        `${s.driver_class}${s.fixed_motor_type ? " — " + s.fixed_motor_type : ""}`,
        MOTOR_ROLE_TREE
      ));
    });
    col.appendChild(sec);
  }

  // Generic pins
  if (board.generic_pins) {
    const sec = document.createElement("section");
    sec.innerHTML = `<h2>Generic pins</h2>`;
    board.generic_pins.forEach((p, i) => {
      const key = resourceKeyPin(i);
      const sub = `${p.mcu_pin} — ${p.direction}`;
      sec.appendChild(p.direction === "output" ? makeOutputRow(key, p.label, sub) : makeInputRow(key, p.label, sub, INPUT_ROLE_TREE));
    });
    col.appendChild(sec);
  }

  // Expansion sockets
  if (board.expansion_sockets) {
    const sec = document.createElement("section");
    sec.innerHTML = `<h2>Expansion socket pins</h2>`;
    board.expansion_sockets.forEach((s, si) => {
      (s.pins||[]).forEach((p, pi) => {
        const key = resourceKeyExp(si, pi);
        const name = `${s.label} — pin ${p.module_pin}`;
        const sub = `${p.mcu_pin} — ${p.direction}`;
        sec.appendChild(p.direction === "output" ? makeOutputRow(key, name, sub) : makeInputRow(key, name, sub, INPUT_ROLE_TREE));
      });
    });
    col.appendChild(sec);
  }

  // RS485 channels -- one coupled resource (tx/rx/optional rts), one dropdown.
  if (board.rs485_channels) {
    const sec = document.createElement("section");
    sec.innerHTML = `<h2>RS485 channels</h2>`;
    board.rs485_channels.forEach((ch, i) => {
      const key = resourceKeyRs485(i);
      const pins = `tx=${ch.tx_pin} rx=${ch.rx_pin}` + (ch.rts_pin ? ` rts=${ch.rts_pin}` : "");
      sec.appendChild(makeRow(key, ch.label, pins, rs485RoleOptions()));
    });
    col.appendChild(sec);
  }

  // Expansion UART connectors (e.g. Corgi's RJ12) -- fixed pins, the only
  // real choice is whether to use it at all (role: "uart_channel").
  if (board.expansion_uarts) {
    const sec = document.createElement("section");
    sec.innerHTML = `<h2>Expansion UART connectors</h2>`;
    board.expansion_uarts.forEach((ex, i) => {
      const key = resourceKeyExpUart(i);
      const pins = `txd=${ex.txd_pin} rxd=${ex.rxd_pin}${ex.connector_type ? " (" + ex.connector_type + ")" : ""}`;
      sec.appendChild(makeRow(key, ex.label, pins, [
        { value: "unused", label: "— Unused —" },
        { value: "uart_channel", label: `I/O Expansion (uart_channel, uart${defaultSecondaryUartNum(board)})` },
      ]));
    });
    if (boardHasUartTmc(board) && board.rs485_channels && board.rs485_channels.length) {
      const warn = document.createElement("div");
      warn.className = "note";
      warn.innerHTML = `<b>Note:</b> this board's onboard TMC drivers already use uart1, so both RS485 ` +
        `and this expansion connector default to uart2 -- per real FluidNC board docs, only one of them ` +
        `can actually be used in a given config file.`;
      sec.appendChild(warn);
    }
    col.appendChild(sec);
  }

  // I2C connectors -- unlike spi:/i2so:, FluidNC rarely has any onboard
  // I2C device (its only I2C-consuming feature, an OLED display, is
  // deprecated), so a board's I2C pins are almost always just brought out
  // to an external connector, not auto-consumed. I2C pins are also often
  // bare GPIOs, so the same connector is frequently repurposed as a plain
  // expansion UART instead (scl_pin -> tx, sda_pin -> rx) -- same idea as
  // an expansion_uart connector. This is therefore bindable, not a fixed
  // peripheral: unused / a real i2c0: bus / a generic expansion UART.
  if (board.i2c_connectors) {
    const sec = document.createElement("section");
    sec.innerHTML = `<h2>I2C connectors</h2>`;
    board.i2c_connectors.forEach((ic, i) => {
      const key = resourceKeyI2c(i);
      const pins = `sda=${ic.sda_pin} scl=${ic.scl_pin}`;
      sec.appendChild(makeRow(key, ic.label, pins, [
        { value: "unused", label: "— Unused —" },
        { value: "i2c_bus", label: "I2C Bus (i2c0: — e.g. OLED display)" },
        { value: "expansion_uart", label: `Expansion UART (scl=tx, sda=rx, uart${defaultSecondaryUartNum(board)})` },
      ]));
    });
    col.appendChild(sec);
  }
}

function makeRow(key, name, sub, options) {
  const row = document.createElement("div");
  row.className = "row";
  const lbl = document.createElement("div");
  lbl.className = "lbl";
  lbl.innerHTML = `<span class="name">${name}</span><span class="sub">${sub}</span>`;
  const sel = document.createElement("select");
  sel.dataset.key = key;
  options.forEach(o => {
    const opt = document.createElement("option");
    opt.value = o.value; opt.textContent = o.label;
    sel.appendChild(opt);
  });
  sel.value = bindings[key] || "unused";
  sel.onchange = () => { bindings[key] = sel.value; generateDraft(); };
  row.appendChild(lbl); row.appendChild(sel);
  return row;
}

/* Two-step row for output-capable pins: step 1 picks the category
 * (a spindle type, or coolant/digital-output as before); step 2, only
 * shown when step 1 is a spindle type, picks which pin within that type.
 * This is what keeps the per-pin option list from growing every time a
 * new spindle type (Relay, HBridge, Dac, ...) gets added to SPINDLE_TYPES
 * -- only the (hidden-until-needed) step 2 list grows. */
function makeOutputRow(key, name, sub) {
  const row = document.createElement("div");
  row.className = "row output-row";
  const lbl = document.createElement("div");
  lbl.className = "lbl";
  lbl.innerHTML = `<span class="name">${name}</span><span class="sub">${sub}</span>`;
  row.appendChild(lbl);

  const controls = document.createElement("div");
  controls.className = "output-controls";

  const primary = document.createElement("select");
  outputCategoryOptions().forEach(o => {
    const opt = document.createElement("option");
    opt.value = o.value; opt.textContent = o.label;
    primary.appendChild(opt);
  });

  const secondary = document.createElement("select");
  secondary.style.display = "none";

  function refreshSecondary() {
    const cat = primary.value;
    const opts = cascadeOptionsFor(cat);
    if (opts) {
      const curSub = roleSubValue(bindings[key] || "");
      secondary.innerHTML = "";
      opts.forEach(([val, label]) => {
        const opt = document.createElement("option");
        opt.value = val; opt.textContent = label;
        secondary.appendChild(opt);
      });
      secondary.value = opts.some(p => p[0] === curSub) ? curSub : opts[0][0];
      secondary.style.display = "";
    } else {
      secondary.style.display = "none";
    }
  }

  primary.value = roleCategory(bindings[key] || "unused");
  refreshSecondary();

  primary.onchange = () => {
    const cat = primary.value;
    if (cascadeOptionsFor(cat)) {
      refreshSecondary();
      bindings[key] = `${cat}:${secondary.value}`;
    } else {
      secondary.style.display = "none";
      bindings[key] = cat;
    }
    generateDraft();
  };
  secondary.onchange = () => {
    bindings[key] = `${primary.value}:${secondary.value}`;
    generateDraft();
  };

  controls.appendChild(primary);
  controls.appendChild(secondary);
  row.appendChild(controls);
  return row;
}

/* Generic N-level cascading row for input-capable pins, driven by a role
 * tree (see INPUT_ROLE_TREE). Unlike makeOutputRow's fixed 2 selects, this
 * renders however many <select> elements the chosen branch actually needs
 * -- 1 for Probe, 2 for Control/Macro, 3 for Limit -- and re-renders from
 * scratch on every change. Whenever a choice is made at some level, any
 * deeper level is auto-filled with its first child so bindings[key] always
 * names a complete, valid leaf value (same policy makeOutputRow uses). */
function makeInputRow(key, name, sub, tree) {
  const row = document.createElement("div");
  row.className = "row cascade-row";
  const lbl = document.createElement("div");
  lbl.className = "lbl";
  lbl.innerHTML = `<span class="name">${name}</span><span class="sub">${sub}</span>`;
  row.appendChild(lbl);

  const controls = document.createElement("div");
  controls.className = "cascade-controls";
  row.appendChild(controls);

  function firstLeafPathFrom(node, segs) {
    let n = node, path = segs.slice();
    while (n.children) {
      const firstKey = Object.keys(n.children)[0];
      path.push(firstKey);
      n = n.children[firstKey];
    }
    return path;
  }

  function render() {
    controls.innerHTML = "";
    const curPath = (bindings[key] || "unused").split(":");

    const top = document.createElement("select");
    const unusedOpt = document.createElement("option");
    unusedOpt.value = "unused"; unusedOpt.textContent = "— Unused —";
    top.appendChild(unusedOpt);
    Object.keys(tree).forEach(k => {
      const opt = document.createElement("option");
      opt.value = k; opt.textContent = tree[k].label;
      top.appendChild(opt);
    });
    const topVal = tree[curPath[0]] ? curPath[0] : "unused";
    top.value = topVal;
    top.onchange = () => {
      if (top.value === "unused") {
        bindings[key] = "unused";
      } else {
        bindings[key] = firstLeafPathFrom(tree[top.value], [top.value]).join(":");
      }
      generateDraft();
      render();
    };
    controls.appendChild(top);
    if (topVal === "unused") return;

    let node = tree[topVal];
    let pathSoFar = [topVal];
    let level = 1;
    while (node.children) {
      const sel = document.createElement("select");
      Object.keys(node.children).forEach(ck => {
        const opt = document.createElement("option");
        opt.value = ck; opt.textContent = node.children[ck].label;
        sel.appendChild(opt);
      });
      const chosen = node.children[curPath[level]] ? curPath[level] : Object.keys(node.children)[0];
      sel.value = chosen;

      const parentNode = node, segsBefore = pathSoFar.slice();
      sel.onchange = () => {
        bindings[key] = firstLeafPathFrom(parentNode.children[sel.value], segsBefore.concat([sel.value])).join(":");
        generateDraft();
        render();
      };

      controls.appendChild(sel);
      pathSoFar.push(chosen);
      node = node.children[chosen];
      level++;
    }
  }

  render();
  return row;
}

function countResources() {
  let n = 0;
  if (board.motor_sockets) n += (board.motor_sockets.sockets||[]).length;
  n += (board.generic_pins||[]).length;
  (board.expansion_sockets||[]).forEach(s => n += (s.pins||[]).length);
  n += (board.rs485_channels||[]).length;
  n += (board.expansion_uarts||[]).length;
  n += (board.i2c_connectors||[]).length;
  return n;
}

/* ---------------------------------------------------------------------
 * Phase B: build the draft config.yaml from current bindings.
 * TBD stubs are inserted only for parameters of roles that got bound —
 * never for the universe of possible FluidNC roles.
 * ------------------------------------------------------------------- */
function motorBlockFor(socket) {
  const dc = socket.driver_class;
  if (dc === "onboard_fixed") {
    const t = socket.fixed_motor_type;
    if (t === "rc_servo") {
      return { key: "rc_servo", body: {
        output_pin: socket.pins.output_pin,
        cal_min_mm: "TBD", cal_max_mm: "TBD"
      }};
    }
    if (t === "tmc_2209") {
      return { key: "tmc_2209", body: {
        step_pin: socket.pins.step_pin,
        direction_pin: socket.pins.direction_pin,
        disable_pin: socket.pins.disable_pin,
        uart_num: 1,
        addr: socket.extra ? socket.extra.addr : "TBD",
        r_sense_ohms: "TBD", run_amps: "TBD", hold_amps: "TBD", microsteps: "TBD"
      }};
    }
    if (t === "tmc_2130") {
      return { key: "tmc_2130", body: {
        step_pin: socket.pins.step_pin,
        direction_pin: socket.pins.direction_pin,
        cs_pin: socket.pins.cs_pin,
        r_sense_ohms: "TBD", run_amps: "TBD", hold_amps: "TBD", microsteps: "TBD"
      }};
    }
    if (t === "tmc_5160") {
      // FluidNC doesn't support TMC2160 by its own name -- it's functionally
      // identical to TMC5160 as far as FluidNC's driver code is concerned
      // (TMC5160 adds an onboard motion controller FluidNC doesn't use), so
      // a board with real TMC2160 chips (e.g. BTT Rodent) still uses
      // fixed_motor_type: tmc_5160. spi_index is a real, fixed board fact
      // (this chip's fixed position in the SPI daisy chain) -- not a
      // per-machine tuning choice -- so it comes straight from socket.extra,
      // same pattern as tmc_2209's addr.
      return { key: "tmc_5160", body: {
        step_pin: socket.pins.step_pin,
        direction_pin: socket.pins.direction_pin,
        disable_pin: socket.pins.disable_pin || "NO_PIN",
        cs_pin: socket.pins.cs_pin || "NO_PIN",
        spi_index: socket.extra ? socket.extra.spi_index : "TBD",
        r_sense_ohms: "TBD", run_amps: "TBD", hold_amps: "TBD", microsteps: "TBD"
      }};
    }
    return { key: t || "onboard_fixed", body: Object.assign({}, socket.pins, { run_amps: "TBD" }) };
  }
  if (dc === "stepstick_socket") {
    // Current and microstepping on a stepstick module are set by an onboard
    // trimpot and physical jumpers -- not software-configurable, so unlike
    // tmc_2209/tmc_2130 there are no tuning params to stub here at all.
    const body = {
      step_pin: socket.pins.step_pin,
      direction_pin: socket.pins.direction_pin,
      disable_pin: socket.pins.disable_pin || "NO_PIN"
    };
    return { key: "stepstick", body };
  }
  // external_connector
  return { key: "standard_stepper", body: {
    step_pin: socket.pins.step_pin,
    direction_pin: socket.pins.direction_pin,
    disable_pin: socket.pins.disable_pin || "NO_PIN"
  }};
}

// Same idea as KINSELECT/KINEMATICS_TYPES: this axis's homing entry is
// keyed by homingSentinel(letter) in `cfg` itself, whether homing is
// enabled or not, so the selector (homingWidgetHtml()) always sits exactly
// where the real "homing:" key belongs -- a non-existent homing: section
// really is different from an empty one, so the wizard shouldn't ever
// carry a real "homing" key around internally for a disabled axis, only
// this sentinel key. The final resolved/copy-download step (see
// generateDraft()) renames this key to the real "homing" when enabled, or
// deletes it outright when disabled -- so config.yaml genuinely omits the
// section rather than ever emitting an empty or placeholder one.
function homingSentinel(letter) { return `HOMINGSELECT_${letter}`; }

function ensureAxis(cfg, letter) {
  if (!cfg.axes[letter]) {
    cfg.axes[letter] = {
      steps_per_mm: "TBD",
      max_rate_mm_per_min: "TBD",
      acceleration_mm_per_sec2: "TBD",
      max_travel_mm: "TBD",
      soft_limits: "TBD",
      [homingSentinel(letter)]: homingEnabled[letter] ? {
        cycle: "TBD",
        positive_direction: "TBD",
        mpos_mm: "TBD",
        feed_mm_per_min: "TBD",
        seek_mm_per_min: "TBD",
        settle_ms: "TBD",
        seek_scaler: "TBD",
        feed_scaler: "TBD"
      } : null
    };
  }
  return cfg.axes[letter];
}

function generateDraft() {
  const cfg = {};
  cfg.name = "TBD";
  cfg.board = board.board.name;

  // Board-specific/pre-populated default overrides for open TBD fields --
  // see collectAndInjectSlots' defaultOverrides param. Declared up front
  // (rather than local to the motor-sockets loop below) since the Start:
  // block also contributes entries to this same map.
  const paramDefaultOverrides = {};

  // Terse "# <label>" comments are produced by inserting a marker KEY
  // (annotate(obj, targetKey, label) below), named after the exact real
  // key it captions, into the SAME object that key belongs to -- inserted
  // immediately before that key's first assignment, so plain JS object
  // insertion-order (already relied on elsewhere here, e.g. uart-before-
  // ModbusVFD ordering) places it directly above, as a SIBLING at the same
  // indentation, never nested inside the thing it's captioning (nesting it
  // one level deeper, e.g. right above a block's own first field, could be
  // misread as captioning only that first field rather than the whole
  // block). js-yaml dumps the marker as an ordinary-looking
  // "__ANNOTATE_FOR_<key>__: <label>" line; annotateYaml() below does a
  // dumb text pass converting every such line into "# <label>" afterward.
  // Naming the marker after its target key (rather than a plain running
  // counter) makes a second annotate() call for the same key idempotently
  // UPDATE that one marker in place rather than stack a second, stale
  // comment above it -- needed because some keys (e.g. a colliding uartN:
  // block shared by RS485 and an expansion UART) get legitimately
  // reassigned wholesale later in this function; the comment should track
  // whichever binding actually won, not accumulate every past one.
  function annotate(obj, targetKey, label) { obj[`__ANNOTATE_FOR_${targetKey}__`] = label; }

  // Kinematics -- always present, defaulting to a bare Cartesian
  // subsection (FluidNC's own real default when unspecified). No left-pane
  // row (see renderResources()'s comment) -- the system-name key itself is
  // a live selector INSIDE the draft, via the KINSELECT sentinel (see
  // kinWidgetHtml()/buildInteractiveYaml()); switching systems here
  // populates any subordinate geometry items as ordinary TBD fields. No
  // "# <label>" annotate() comment either, same reasoning as Start: not
  // tied to any particular board resource, so there's no "which board fact
  // triggered this" story worth captioning.
  const kt = KINEMATICS_TYPES[kinematicsType] || KINEMATICS_TYPES.Cartesian;
  cfg.kinematics = { KINSELECT: kt.stub() };

  // Start -- always present, no left-pane row (see comment on the section's
  // declaration above). must_home is left genuinely open (whether homing
  // should be required before running a program is a real per-machine
  // decision), but deactivate_parking/check_limits are pre-populated with
  // FluidNC's own compiled-in defaults via defaultOverrides -- settings the
  // user need not think about (rarely changed) but can still edit inline,
  // same mechanism as a board-specific hint like r_sense_ohms. No "# <label>"
  // annotate() comment here -- unlike every other annotated section/pin,
  // Start isn't associated with any particular board resource, so there's
  // no "which board fact triggered this" fact worth captioning.
  cfg.start = { must_home: "TBD", deactivate_parking: "TBD", check_limits: "TBD" };
  paramDefaultOverrides["start.deactivate_parking"] = { default: false, defaultKind: "firmware" };
  paramDefaultOverrides["start.check_limits"] = { default: true, defaultKind: "firmware" };

  const engineMap = { i2s: "I2S_STREAM", rmt: "RMT", timed: "Timed", pio: "PIO" };
  cfg.stepping = {
    engine: engineMap[(board.stepping.engines||["rmt"])[0]] || "RMT",
    idle_ms: "TBD", pulse_us: "TBD", dir_delay_us: "TBD", disable_delay_us: "TBD"
  };

  // Fixed peripherals: fully known facts, copied straight through, no TBD.
  const fp = board.fixed_peripherals || {};
  if (fp.spi) cfg.spi = fp.spi;
  if (fp.sdcard) cfg.sdcard = Object.assign({}, fp.sdcard);
  if (fp.i2so) cfg.i2so = { bck_pin: fp.i2so.bck_pin, data_pin: fp.i2so.data_pin, ws_pin: fp.i2so.ws_pin };
  // NOTE: I2C is intentionally NOT handled here as a fixed peripheral --
  // unlike spi:/i2so:, FluidNC rarely has an onboard device actually using
  // the bus (its only I2C-consuming feature, an OLED display, is
  // deprecated), so a board's I2C pins are a bindable resource
  // (board.i2c_connectors), handled below alongside expansion_uarts, not
  // auto-emitted here. (Also confirmed against the connected FluidNC
  // source, MachineConfig.cpp's handler.sections("i2c", 0, MAX_N_I2C,
  // ...), that the real config key is numbered i2c0:/i2c1:/etc., not a
  // bare "i2c:" -- reflected in that emission below.)
  (fp.dedicated_uarts||[]).forEach((u, i) => {
    cfg[`uart${i+1}`] = { txd_pin: u.txd_pin, rxd_pin: u.rxd_pin, baud: u.baud, mode: u.mode };
  });

  cfg.axes = {};
  if (board.motor_sockets && board.motor_sockets.shared_disable_pin) {
    cfg.axes.shared_stepper_disable_pin = board.motor_sockets.shared_disable_pin;
  }

  // (paramDefaultOverrides declared up front, near cfg.name/-cfg.board above --
  // populated below when a motor socket's own extra facts document a
  // board-specific override, e.g. BTT Rodent's verified-correct
  // r_sense_ohms, overriding the generic per-driver-family guess
  // specForKey would otherwise suggest.)

  // Phase A results -> Phase B stubbing, motor sockets
  (board.motor_sockets ? board.motor_sockets.sockets : []).forEach((socket, i) => {
    const role = bindings[resourceKeyMotor(i)];
    if (!role || role === "unused") return;
    const [letter, slot] = role.split(":");
    if (!AXES.includes(letter)) return;
    const axis = ensureAxis(cfg, letter);
    const block = motorBlockFor(socket);
    // Annotated on `axis` (a sibling of motor0:/motor1:, at the same
    // indentation), not inside axis[slot] -- a comment nested one level
    // deeper, right above standard_stepper:, could be misread as applying
    // only to that first item rather than to the whole motor0:/motor1:
    // block this connector's pins occupy.
    annotate(axis, slot, socket.label);
    axis[slot] = axis[slot] || {};
    axis[slot][block.key] = block.body;
    if (socket.extra && socket.extra.r_sense_ohms_hint != null) {
      paramDefaultOverrides[`axes.${letter}.${slot}.${block.key}.r_sense_ohms`] = {
        default: socket.extra.r_sense_ohms_hint,
        defaultKind: "board",
      };
    }
  });

  // Generic pins + expansion pins -> limits / control / probe / spindle / coolant / digital outs
  const allPins = [];
  (board.generic_pins||[]).forEach((p, i) => allPins.push({ p, key: resourceKeyPin(i) }));
  (board.expansion_sockets||[]).forEach((s, si) => (s.pins||[]).forEach((p, pi) =>
    allPins.push({ p: { label: `${s.label}/${p.module_pin}`, mcu_pin: p.mcu_pin, direction: p.direction }, key: resourceKeyExp(si, pi) })
  ));

  let spindleBound = false;
  cfg.control = {};
  allPins.forEach(({ p, key }) => {
    const role = bindings[key];
    if (!role || role === "unused") return;
    const pin = p.mcu_pin;

    if (role.startsWith("limit:")) {
      const [, letter, which] = role.split(":");
      const axis = ensureAxis(cfg, letter);
      axis.motor0 = axis.motor0 || {};
      const field = which === "neg" ? "limit_neg_pin" : which === "pos" ? "limit_pos_pin" : "limit_all_pin";
      annotate(axis.motor0, field, p.label);
      axis.motor0[field] = pin;
    } else if (role.startsWith("probe:")) {
      // Child key is literally the real Probe:: config field name
      // ("pin" or "toolsetter_pin") -- see Probe::group() in the
      // connected FluidNC source.
      const field = role.split(":")[1];
      cfg.probe = cfg.probe || {};
      annotate(cfg.probe, field, p.label);
      cfg.probe[field] = pin;
    } else if (role.startsWith("control:")) {
      // Covers all real Control:: pins, including the 4 macro buttons
      // and fault/estop/homing_button, which are siblings of feed_hold
      // etc. in the actual "control:" config block.
      const which = role.split(":")[1];
      annotate(cfg.control, `${which}_pin`, p.label);
      cfg.control[`${which}_pin`] = pin;
    } else if (role.startsWith("user_input:")) {
      // Machine::UserInputs -- generic digital0-7/analog0-3 pins under
      // "user_inputs:", unrelated to Limit/Probe/Control.
      const [, subtype, idx] = role.split(":");
      cfg.user_inputs = cfg.user_inputs || {};
      annotate(cfg.user_inputs, `${subtype}${idx}_pin`, p.label);
      cfg.user_inputs[`${subtype}${idx}_pin`] = pin;
    } else if (role.startsWith("spindle:")) {
      // Spindle type picks both the top-level config key and the exact
      // TBD tuning stub via SPINDLE_TYPES -- same dispatch-by-chosen-
      // variant pattern used for motor sockets and RS485/VFD spindles.
      // Each type's stub() reflects its own real config fields (e.g.
      // Relay/DAC genuinely have no pwm_hz; BESC has two extra tunables),
      // verified against FluidNC's actual source, not assumed uniform.
      const [, type, which] = role.split(":");
      const def = SPINDLE_TYPES[type];
      const cfgKey = def ? def.cfgKey : type;
